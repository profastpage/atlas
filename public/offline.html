<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Sin Conexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030712;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #10b981; }
    .pulse {
      width: 12px; height: 12px;
      background: #ef4444;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F50C;</div>
    <h1>Sin Conexion</h1>
    <p>Atlas necesita internet para funcionar. Revisa tu conexion y vuelve a intentarlo.</p>
    <button onclick="location.reload()">
      <span class="pulse"></span>
      Reintentar
    </button>
  </div>
</body>
</html>
